<!DOCTYPE html>
<html lang="en">
	<head>
    <title>Amazon</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

		<link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

		<link rel="stylesheet" href="styles/general.css">
		<link rel="stylesheet" href="styles/header.css">
		<link rel="stylesheet" href="styles/main.css">
	</head>
	<body>
    <header class="amazon-header">
			<div class="left-section">
				<a class="header-link" href=".">
					<img class="amazon-logo" src="images/amazon-logo-white.png">
				</a>
			</div>
			<div class="middle-section">
				<input class="search-bar" type="text" placeholder="Search">
				<button class="search-button">
					<img class="search-icon" src="images/icons/search-icon.png">
				</button>
			</div>
			<div class="right-section">
				<a class="header-link returns-orders-container" href="">
					<div class="returns-text">Returns</div>
					<div class="orders-text">& Orders</div>
				</a>
				<a class="header-link cart-container" href="">
					<div class="cart-item-count">0</div>
					<img class="cart-icon" src="images/icons/cart-icon.png">
					<div class="cart-text">Cart</div>
				</a>
			</div>
		</header>

		<main>
			<section class="products-grid">
				<div class="product-container">
					<div class="product-image-container">
						<img class="product-image" src="images/products/athletic-cotton-socks-6-pairs.jpg">
					</div>
					<div class="product-name">Black and Gray Athletic Cotton Socks - 6 Pairs</div>
					<div class="product-rating-container">
						<img class="product-stars-rating" src="images/ratings/rating-45.png">
						<div class="product-rating-count">87</div>
					</div>
					<div class="product-price">$10.90</div>
					<select class="product-count-selector">
						<option selected value="1">1</option>
						<option value="2">2</option>
						<option value="3">3</option>
						<option value="4">4</option>
						<option value="5">5</option>
						<option value="6">6</option>
						<option value="7">7</option>
						<option value="8">8</option>
						<option value="9">9</option>
						<option value="10">10</option>
					</select>
					<button class="add-to-cart-button">Add to Cart</button>
				</div>
			</section>
		</main>
	</body>
</html>
