<!DOCTYPE html>
<html lang="en">
	<head>
    <title>Checkout</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

		<link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

		<link rel="stylesheet" href="styles//shared/general.css">
		<link rel="stylesheet" href="styles/pages/checkout/checkout-header.css">
    <link rel="stylesheet" href="styles/pages/checkout/checkout.css">

		<script type="module" src="scripts/checkout.js" defer></script>
	</head>
	<body>
    <header>
		</header>
		<main>
      <div class="checkout-title">Review your order</div>
			<section class="checkout-flex">
        <div class="checkout-item-container">
          <div class="selected-date">Delivery date: Tuesday, July 21</div>
          <div class="inner-container">
            <div class="item-image-container">
              <img src="images/products/athletic-cotton-socks-6-pairs.jpg">
            </div>
            <div class="item-description-container">
              <div class="item-name two-line-limit">Black and Gray Athletic Cotton Socks - 6 Pairs</div>
              <div class="item-price">$10.90</div>
              <div class="item-quantity">Quantity: 14 Update Delete</div>
            </div>
            <div class="delivery-options-container">
              <div class="delivery-option-title">Choose a delivery option:</div>
              <div class="delivery-option-container">
                <input type="radio">
                <div>
                  <div class="delivery-option-date">Monday, July 27</div>
                  <div class="delivery-option-shipping">FREE Shipping</div>
                </div>
              </div>
              <div class="delivery-option-container">
                <input type="radio">
                <div>
                  <div class="delivery-option-date">Tuesday, July 21</div>
                  <div class="delivery-option-shipping">$4.99 - Shipping</div>
                </div>
              </div>
              <div class="delivery-option-container">
                <input type="radio">
                <div>
                  <div class="delivery-option-date">Friday, July 17</div>
                  <div class="delivery-option-shipping">$9.99 - Shipping</div>
                </div>
              </div>
            </div>
          </div>
        </div>
			</section>
		</main>
	</body>
</html>
