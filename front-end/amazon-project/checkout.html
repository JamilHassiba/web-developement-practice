<!DOCTYPE html>
<html lang="en">
	<head>
    <title>Checkout</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

		<link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

		<link rel="stylesheet" href="styles//shared/general.css">
		<link rel="stylesheet" href="styles/pages/checkout/checkout-header.css">
    <link rel="stylesheet" href="styles/pages/checkout/checkout.css">

		<script type="module" src="scripts/checkout.js" defer></script>
	</head>
	<body>
    <header class="header-flex">
      <div class="header-content">
        <a href=".">
          <img class="amazon-logo" src="images/amazon-logo.png">
          <img class="amazon-logo-mobile" hidden src="images/amazon-mobile-logo.png">
        </a>
        <div class="header-title">Checkout (<span>131 items</span>)</div>
        <div class="lock-icon-container">
          <img class="lock-icon" src="images/icons/checkout-lock-icon.png">
        </div>
      </div>
		</header>
		<main>
      <div class="checkout-title">Review your order</div>
			<section class="checkout-grid">
        <div class="checkout-items">
          <div class="empty-cart-container">
            <div class="empty-cart-text">Your cart is empty.</div>
            <a href="index.html">
              <button class="view-products-button primary-button">View products</button>
            </a>
          </div>
        </div>
        
        <div class="order-summary-container">
          <div class="order-summary-title">Order Summary</div>
          <div class="order-summary-row">
            <div>Items (51):</div>
            <div>$970.61</div>
          </div>
          <div class="order-summary-row">
            <div>Shipping & handling:</div>
            <div>$9.99</div>
          </div>
          <div class="order-summary-row order-subtotal">
            <div>Total before tax:</div>
            <div>$980.60</div>
          </div>
          <div class="order-summary-row">
            <div>Estimated tax (10%):</div>
            <div>$98.06</div>
          </div>
          <div class="order-summary-row order-total">
            <div>Order total:</div>
            <div>$1,078.66</div>
          </div>
          <button class="place-order-button primary-button">Place your order</button>
        </div>
			</section>
		</main>
	</body>
</html>
