<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Rock Paper Scissors</title>

    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
  </head>

  <body>
    <p class="title">Rock Paper Scissors</p>

    <button class="emoji-btn js-emoji-btn" data-emoji="rock">
      <img src="rock-emoji.png">
    </button>
    <button class="emoji-btn js-emoji-btn" data-emoji="paper">
      <img src="paper-emoji.png">
    </button>
    <button class="emoji-btn js-emoji-btn" data-emoji="scissors">
      <img src="scissors-emoji.png">
    </button>

    <p class="result js-result"></p>

    <div class="moves-container js-moves-container" hidden>
      <span>You</span>
      <img class="js-player-move" src="rock-emoji.png">
      <img class="js-computer-move" src="scissors-emoji.png">
      <span>Computer</span>
    </div>

    <p class="score js-score"></p>
    <button class="reset-btn js-reset-btn">Reset Score</button>
  </body>
</html>
