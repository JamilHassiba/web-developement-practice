<!DOCTYPE html>
<html lang="en">
  <head>
    <style>
      body {
        text-align: center;
        font-family: Arial;
      }

      p {
        margin-top: 0;
        margin-bottom: 0;
      }

      .new {
        color: rgb(245, 99, 0);
        font-size: 14px;
        font-weight: bold;
        margin-bottom: 10px;
      }

      .mac {
        font-weight: bold;
        font-size: 24px;
        margin-bottom: 5px;
      }

      .description {
        font-weight: bold;
        font-size: 45px;
        margin-bottom: 15px;
      }

      .price {
        color: rgb(76, 76, 76);
        margin-bottom: 25px;
      }

      .btn {
        border: none;
        padding: 7px 15px;
        background-color: rgb(0, 113, 227);
        color: white;
        border-radius: 30px;
        font-weight: bold;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
      <p class="new">New</p>
      <p class="mac">MacBook Pro</p>
      <p class="description">Supercharged for pros.</p>
      <p class="price">from $1999</p>
      <button class="btn">Buy</button>
  </body>
</html>
