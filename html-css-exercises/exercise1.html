<!DOCTYPE html>
<html>
  <head>
    <style>
      .link {
        color: rgb(0, 113, 133);
      }

      .item {
        font-size: 24px;
        font-weight: bold;
      }

      .price {
        color: rgb(0, 118, 0);
        font-weight: bold;
      }

      .cart-button {
        background-color: rgb(255, 216, 20);
        border: none;
        border-radius: 15px;
        padding: 5px 10px;
        margin-right: 5px;
        cursor: pointer;
      }

      .buy-button {
        background-color: rgb(255, 164, 28);
        border: none;
        border-radius: 15px;
        padding: 5px 20px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <a class="link" href="https://www.amazon.com">Back to Amazon</a>
    <p class="item">Nike Black Running Shoes</p>
    <p class="price">$39 - in stock.</p>
    <p class="delivery">Free delivery tomorrow.</p>
    <button class="cart-button">Add to Cart</button>
    <button class="buy-button">Buy now</button>
  </body>
</html>
