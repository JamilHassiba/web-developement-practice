<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Exercise 5</title>
    <style>
      img {
        display: block;
        width: 200px;
        border-radius: 20px;
        cursor: pointer;
      }

      img:hover {
        display: block;
        width: 200px;
        height: 200px;
        object-fit: cover;
        object-position: center;
      }

      img:active {
        display: block;
        width: 200px;
        height: 200px;
        object-fit: cover;
        object-position: center;
        border-radius: 50%;
      }
    </style>
  </head>
  <body>
      <img src="cat.png">
  </body>
</html>
